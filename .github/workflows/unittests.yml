name: Unittests
on: [pull_request, workflow_dispatch]
jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: python -m pip install -r requirements.txt
      - name: Run unit tests
        run: |
          cd src
          python run_unit_tests.py -a
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: |
          python -m pip install -r requirements.txt
      - name: Run unit tests
        run: |
          cd src
          python run_unit_tests.py -a
  macos:
    runs-on: macos-14
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: python -m pip install -r requirements.txt
      - name: Run unit tests
        run: |
          cd src
          python run_unit_tests.py -a
