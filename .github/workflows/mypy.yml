name: Mypy
on: [pull_request, workflow_dispatch]
jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: 3.12
          cache: 'pip'
      - run: python -m pip install -r requirements.txt
      - name: Install mypy
        run: pip install mypy
      - name: Run mypy
        run: |
          wget -O libtorrent.pyi https://raw.githubusercontent.com/arvidn/libtorrent/1d644d19cb916261f651458aa5990b9fe1017299/bindings/python/libtorrent/__init__.pyi
          mypy --install-types --non-interactive
